{% extends "base.html" %}

{% block content %}

<section class="section design-page">
    <h2>Signature Embroidery Showcase</h2>
    <p>
    Explore selected pieces from our live production portfolio.
    Each panel reflects machine precision, balanced composition, and
    market-ready finishing.
    </p>

    <div class="gallery design-gallery">
        {% for img in images %}
        <div class="gallery-card">
            <img src="{{ url_for('static', filename='images/designs/' + img) }}"
                 onclick="openLightbox(this.src)">
            <div class="overlay">
                <span>Open Preview</span>
            </div>
        </div>
        {% endfor %}
    </div>
</section>

{% endblock %}
